name: Run Weather Decision Bot

on:
  schedule:
    - cron: '0 23 * * *' # 每天定時執行（例如香港時間早上 7 點）
  workflow_dispatch: # 允許手動點擊執行

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 簽出程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-level: '3.10'

      - name: 3. 安裝依賴套件 (Install dependencies) 💡核心修正點
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 4. 執行主程式 (Run script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
